<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clik — Login</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="login-body">
    <div class="login-card">
        <h2>🖱️ Clik</h2>
        <p>Inicia sesión para continuar</p>
        <div id="error-msg" class="error-msg"></div>
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="usuario" placeholder="Tu usuario"/>
        </div>
       <div class="form-group">
    <label>Contraseña</label>
    <div class="input-icon">
        <input type="password" id="contrasena" placeholder="Tu contraseña"/>
        <span onclick="togglePassword()" id="ojito">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#888" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
        </span>
    </div>
</div>
        <button onclick="login()">Iniciar Sesión</button>
    </div>
    <script src="../js/auth.js"></script>
</body>
</html>
